apiVersion: v1
kind: Service
metadata:
  name: ecommerce-frontend-svc
  namespace: ecommerce-frontend-ns
  labels:
    app: ecommerce-frontend  # Route traffic to pods with this label
spec:
  type: ClusterIP  # Changed from LoadBalancer - nginx ingress will handle it
  selector:
    app: ecommerce-frontend
  ports:
  - name: http
    port: 80
    targetPort: 80  
    protocol: TCP
  sessionAffinity: None