apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  # PRODUCTION - Trusted SSL certificates (limited to 5 certs/week)
  name: letsencrypt-prod
  # For testing (unlimited requests), use: letsencrypt-staging
spec:
  acme:
    # PRODUCTION server (trusted certificates)
    server: https://acme-v02.api.letsencrypt.org/directory
    # For testing (unlimited), use: https://acme-staging-v02.api.letsencrypt.org/directory
    email: chriscrsov@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod
      # For testing, use: letsencrypt-staging
    solvers:
    - http01:
        ingress:
          ingressClassName: nginx