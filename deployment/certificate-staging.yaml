apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: frontend-tls-cert
  namespace: ecommerce-frontend-ns
spec:
  secretName: ecommerce-frontend-tls-secret
  issuerRef:
    name: letsencrypt-staging  # Using STAGING issuer (unlimited rate limits)
    kind: ClusterIssuer
  dnsNames:
    - shop.emchrismobility.com
