version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL}
        - REACT_APP_ENV=production
    image: ${REGISTRY:-}${IMAGE_NAME:-ecommerce-frontend}:${VERSION:-latest}
    container_name: ecommerce-frontend-prod
    ports:
      - "${FRONTEND_PORT:-80}:80"
      - "${FRONTEND_HTTPS_PORT:-443}:443"
    environment:
      - NODE_ENV=production
    networks:
      - ecommerce-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.ecommerce.service=frontend"
      - "com.ecommerce.environment=production"

networks:
  ecommerce-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

# Production volumes would be defined here if needed
volumes:
  nginx-logs:
    driver: local
